let openId = null;

function render(items){
  const list = document.getElementById('list');
  list.innerHTML = '';
  items.forEach(s => {
    const card = document.createElement('div');
    card.className = 'scard' + (openId === s.id ? ' open' : '');
    card.innerHTML = `
      <div class="scard-hdr" onclick="toggle(${s.id})">
        <div class="scard-num">${s.id}</div>
        <div class="scard-obj">
          <div class="scard-trigger">${s.trigger}</div>
          <div class="scard-type">${s.type}</div>
        </div>
        <div class="scard-arr"><i class="ti ti-chevron-down" aria-hidden="true"></i></div>
      </div>
      <div class="scard-body">
        <div class="script-formula">
          <div class="formula-label">Формула</div>
          <div class="formula-text">${s.formula}</div>
        </div>
        <div class="dialog">${s.dialog.map(m=>`
          <div class="msg-wrap ${m.who==='us'?'right':''}">
            <div class="msg-label ${m.who==='cl'?'cl':'us'}">${m.who==='cl'?'Клиент':'Вы'}</div>
            <div class="msg msg-${m.who}">${m.text}</div>
          </div>`).join('')}
        </div>
        <div class="script-result">
          <div class="result-label">Почему работает</div>
          <div class="result-text">${s.result}</div>
        </div>
        <div class="tips-row">${s.tips.map(t=>`<div class="tip-pill"><strong>${t.label}</strong>${t.text}</div>`).join('')}</div>
      </div>`;
    list.appendChild(card);
  });
}

function toggle(id){
  openId = openId === id ? null : id;
  const cat = document.querySelector('.cat-btn.on');
  const current = cat ? cat.getAttribute('onclick').match(/'([^']+)'/)[1] : 'all';
  const filtered = current === 'all' ? SCRIPTS : SCRIPTS.filter(s => s.cat === current);
  render(filtered);
}

function filter(cat, btn){
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  openId = null;
  const items = cat === 'all' ? SCRIPTS : SCRIPTS.filter(s => s.cat === cat);
  render(items);
}

render(SCRIPTS);
</script>
